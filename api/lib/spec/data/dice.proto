syntax = "proto3";

message DiceSet {
    int32 count = 1; // Number of dice to roll
    int32 sides = 2; // Number of sides on each die
}

message DiceDefinition {
    repeated DiceSet dice_sets = 1; // List of different dice sets to roll
}

message RollResult {
    repeated int32 individual_rolls = 1; // List of individual die rolls
}
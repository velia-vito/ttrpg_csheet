syntax = "proto3";

// Persistent player authentication tokens.
message PlayerIdentity {
    string username = 1;
    string password = 2;
}

// Session authentication token.
message AuthToken {
    optional string token = 1;
    bool is_approved = 2;
}


// Service information for connecting to a micro-service.
message ServiceInfo {
    Services service_name = 1;
    int32 service_port = 2;
}

// Request for `ServiceInfo` on a particular service.
message ServiceRequest {
    Services service_name = 1;
}

// Enumeration of available services.
enum Services {
    UNSPECIFIED_SERVICE = 0;
    SHEET_SERVICE = 1;
    MESSAGE_SERVICE = 2;
}

name: server
description: DM UI and gRPC server for ttrpg_csheet.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.11.4

dependencies:
  api:
    path: ../api

  bcrypt: ^1.2.0
  flutter:
    sdk: flutter
  grpc: any
  protobuf: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  solid_lints: ^0.3.2
  test: ^1.25.6

flutter:
  uses-material-design: true
